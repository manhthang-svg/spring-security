spring:
    flyway:
        baseline-on-migrate: true
        baseline-version: 0
        enabled: true
    jpa:
        hibernate:
            ddl-auto: validate
        properties:
            hibernate:
                format_sql: true
        show-sql: false
    profiles:
        default: local

springdoc:
    api-docs:
        enabled: true
        path: /v3/api-docs
    swagger-ui:
        enabled: true
        path: /swagger-ui.html
        disable-swagger-default-url: true
        display-request-duration: true
        operations-sorter: method
        tags-sorter: alpha
